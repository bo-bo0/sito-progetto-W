<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="bo bo">
        <title>Progetto W</title>
        <link rel="stylesheet" href="style.css?v3">
        <link rel="icon" href="images/W.png">
    </head>
    <body>

        <div class="board" id="board">
            <button class="board__handle" id="boardHandle" aria-label="Apri bacheca">
                <span class="board__handle-label">ANNUNCI</span>
                <span class="board__handle-arrow" id="boardArrow">▾</span>
            </button>
            <div class="board__panel">
                <div class="board__inner">
                    <div class="board__image-wrap">
                        <img
                            src="images/new.png"
                            alt="Immagine bacheca"
                            class="board__img"
                        />
                    </div>
                    <p class="board__text">
                        Parte un nuovo caricamento, e con esso una nuova 
                        avventura!
                    </p>
                </div>
            </div>
        </div>

        <main class="page">
            <img class="logo" src="images/W.png" alt="W Logo">

            <div class="loader">
                <span class="loader__label">&nbsp;</span>
                <div class="loader__bar"></div>
                <div class="loader__caption">
                    
                    aggiunta di alcune sezioni di gameplay

                    <br><br><br><br><br>

                    Fatto:
                    <br><br>
                    ✓ storia principale sviluppata (100%)
                </div>
            </div>
        </main>

        <script src="index.js?v=vL30" defer></script>
        <script src="board.js" defer></script>
    </body>
</html>
